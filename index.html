<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>ChenERP 中国象棋</title>
<style>
body{
    text-align:center;
    font-family:"Microsoft YaHei", Arial;
    background:#f5f5f5;
}
h1{ color:#b30000; }
#info{
    font-size:20px;
    margin:10px;
    font-weight:bold;
}
#board{
    margin:auto;
    border-collapse:collapse;
}
#board td{
    width:60px;
    height:60px;
    border:1px solid #333;
    background:#f4d9a3;
    font-size:30px;
    font-weight:bold;
    text-align:center;
    cursor:pointer;
}
.red{ color:red; }
.black{ color:black; }
.selected{ background:#80ff80 !important; }
button{
    margin:15px;
    padding:8px 20px;
    font-size:16px;
}
</style>
</head>

<body>

<h1>ChenERP 中国象棋</h1>
<div id="info">红方走棋</div>
<button onclick="resetGame()">重新开始</button>

<table id="board"></table>

<script>
let board;
let selected = null;
let currentPlayer = "red";

const initBoard = [
 ['車','馬','象','士','將','士','象','馬','車'],
 ['','','','','','','','',''],
 ['','炮','','','','','','炮',''],
 ['卒','','卒','','卒','','卒','','卒'],
 ['','','','','','','','',''],
 ['','','','','','','','',''],
 ['兵','','兵','','兵','','兵','','兵'],
 ['','炮','','','','','','炮',''],
 ['','','','','','','','',''],
 ['車','馬','相','仕','帥','仕','相','馬','車']
];

function getColor(row, piece){
    if(piece === "") return "";
    return row < 5 ? "black" : "red";
}

function resetGame(){
    board = initBoard.map(row => row.slice());
    selected = null;
    currentPlayer = "red";
    drawBoard();
    updateInfo();
}

function updateInfo(){
    document.getElementById("info").innerText =
        currentPlayer === "red" ? "红方走棋" : "黑方走棋";
}

function drawBoard(){
    const table = document.getElementById("board");
    table.innerHTML = "";

    for(let r=0; r<10; r++){
        const tr = document.createElement("tr");

        for(let c=0; c<9; c++){
            const td = document.createElement("td");
            const piece = board[r][c];

            td.innerText = piece;

            const color = getColor(r, piece);
            if(color) td.className = color;

            if(selected && selected.r === r && selected.c === c){
                td.classList.add("selected");
            }

            td.onclick = function(){
                clickCell(r,c);
            };

            tr.appendChild(td);
        }

        table.appendChild(tr);
    }
}

function isSoldierMoveValid(piece, fromR, fromC, toR, toC){
    const dr = toR - fromR;
    const dc = toC - fromC;

    // 红兵：向上走，行数减少
    if(piece === "兵"){
        const crossedRiver = fromR <= 4;

        if(!crossedRiver){
            return dr === -1 && dc === 0;
        }else{
            return (dr === -1 && dc === 0) || (dr === 0 && Math.abs(dc) === 1);
        }
    }

    // 黑卒：向下走，行数增加
    if(piece === "卒"){
        const crossedRiver = fromR >= 5;

        if(!crossedRiver){
            return dr === 1 && dc === 0;
        }else{
            return (dr === 1 && dc === 0) || (dr === 0 && Math.abs(dc) === 1);
        }
    }

    return true;
}

function isMoveValid(piece, fromR, fromC, toR, toC){

    // ===== 兵卒规则 =====
    if(piece === "兵" || piece === "卒"){
        return isSoldierMoveValid(piece, fromR, fromC, toR, toC);
    }
    
// ===== 马规则 =====
if(piece === "馬"){

    let dr = toR - fromR;
    let dc = toC - fromC;

    let adr = Math.abs(dr);
    let adc = Math.abs(dc);

    // 必须走日
    if(!((adr===2 && adc===1) || (adr===1 && adc===2))){
        return false;
    }

    // 蹩马腿判断

    if(adr===2){

        let legR = fromR + dr/2;
        let legC = fromC;

        if(board[legR][legC] !== ""){
            return false;
        }
    }

    if(adc===2){

        let legR = fromR;
        let legC = fromC + dc/2;

        if(board[legR][legC] !== ""){
            return false;
        }
    }

    return true;
}
    
    // ===== 炮规则 =====
if(piece === "炮"){

    // 必须横走或竖走
    if(fromR !== toR && fromC !== toC){
        return false;
    }

    let count = 0;

    if(fromR === toR){
        let start = Math.min(fromC,toC)+1;
        let end   = Math.max(fromC,toC);

        for(let c=start;c<end;c++){
            if(board[fromR][c] !== ""){
                count++;
            }
        }
    }else{
        let start = Math.min(fromR,toR)+1;
        let end   = Math.max(fromR,toR);

        for(let r=start;r<end;r++){
            if(board[r][fromC] !== ""){
                count++;
            }
        }
    }

    // 目标位置有棋子：吃子，必须隔一个
    if(board[toR][toC] !== ""){
        return count === 1;
    }

    // 目标位置为空：移动，不能隔子
    return count === 0;
}
    
    // ===== 车规则 =====
    if(piece === "車"){

        // 必须横走或竖走
        if(fromR !== toR && fromC !== toC){
            return false;
        }

        // 统计中间棋子数量
        let count = 0;

        if(fromR === toR){

            let start = Math.min(fromC,toC)+1;
            let end   = Math.max(fromC,toC);

            for(let c=start;c<end;c++){
                if(board[fromR][c] !== ""){
                    count++;
                }
            }

        }else{

            let start = Math.min(fromR,toR)+1;
            let end   = Math.max(fromR,toR);

            for(let r=start;r<end;r++){
                if(board[r][fromC] !== ""){
                    count++;
                }
            }

        }

        return count === 0;
    }

    // 其他棋子暂时自由移动
    return true;
}    

function clickCell(r,c){
    const piece = board[r][c];

    if(selected === null){
        if(piece === "") return;

        const color = getColor(r,piece);
        if(color !== currentPlayer){
            alert("现在轮到" + (currentPlayer==="red" ? "红方" : "黑方") + "走棋");
            return;
        }

        selected = {r:r, c:c};
        drawBoard();
        return;
    }

    const from = selected;
    const movingPiece = board[from.r][from.c];
    const targetPiece = board[r][c];

    if(from.r === r && from.c === c){
        selected = null;
        drawBoard();
        return;
    }

    if(targetPiece !== ""){
        const targetColor = getColor(r,targetPiece);
        if(targetColor === currentPlayer){
            selected = {r:r, c:c};
            drawBoard();
            return;
        }
    }

    if(!isMoveValid(movingPiece, from.r, from.c, r, c)){
        alert("兵/卒不能这样走！");
        return;
    }

    board[r][c] = movingPiece;
    board[from.r][from.c] = "";

    selected = null;
    currentPlayer = currentPlayer === "red" ? "black" : "red";

    drawBoard();
    updateInfo();
}

resetGame();
</script>

</body>
</html>
