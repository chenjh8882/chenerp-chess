<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>ChenERP 中国象棋</title>
<style>
body{ text-align:center; font-family:"Microsoft YaHei",Arial; background:#eee; }
h1{ color:#b30000; }
#info{ font-size:20px; margin:10px; font-weight:bold; }

#boardWrap{
    position:relative;
    width:620px;
    margin:auto;
    background:#d9a85c;
    padding:18px;
    border:8px solid #7b4a20;
}

#board{
    margin:auto;
    border-collapse:collapse;
}

#board td{
    width:62px;
    height:62px;
    border:1px solid #5c3517;
    background:#e7bd72;
    text-align:center;
    cursor:pointer;
    position:relative;
}

#riverText{
    position:absolute;
    top:303px;
    left:0;
    width:100%;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#7a2d00;
    letter-spacing:16px;
    pointer-events:none;
    z-index:1;
}

.piece{
    display:inline-flex;
    width:48px;
    height:48px;
    border-radius:50%;
    background:#f8e6bd;
    border:3px solid #6b3315;
    align-items:center;
    justify-content:center;
    font-size:30px;
    font-weight:bold;
    box-shadow:2px 2px 4px #555;
    position:relative;
    z-index:2;
}

.redPiece{
    color:#d00000;
    border-color:#d00000;
}

.blackPiece{
    color:#111;
    border-color:#111;
}

.palace{
    position:absolute;
    width:176px;
    height:2px;
    background:#5c3517;
    transform-origin:left center;
    z-index:1;
}

.top.p1{
    left:250px;
    top:82px;
    transform:rotate(45deg);
}
.top.p2{
    left:372px;
    top:82px;
    transform:rotate(135deg);
}

.bottom.p1{
    left:250px;
    top:703px;
    transform:rotate(45deg);
}
.bottom.p2{
    left:372px;
    top:703px;
    transform:rotate(135deg);
}
.selected .piece{
    background:#fff176;
    box-shadow:0 0 12px #ff0000;
}

button{
    margin:15px;
    padding:8px 20px;
    font-size:16px;
}
</style>
</head>

<body>
<h1>ChenERP 中国象棋</h1>
<div id="info">红方走棋</div>
<button onclick="resetGame()">重新开始</button>
    
<div id="boardWrap">
    
<div class="palace top p1"></div>
<div class="palace top p2"></div>
<div class="palace bottom p1"></div>
<div class="palace bottom p2"></div>
    
    <div id="riverText">楚河　　　　汉界</div>
    <table id="board"></table>
</div>

<script>
let board;
let selected=null;
let currentPlayer="red";

function P(text,color){ return {text:text,color:color}; }

const initBoard=[
 [P("車","black"),P("馬","black"),P("象","black"),P("士","black"),P("將","black"),P("士","black"),P("象","black"),P("馬","black"),P("車","black")],
 [null,null,null,null,null,null,null,null,null],
 [null,P("炮","black"),null,null,null,null,null,P("炮","black"),null],
 [P("卒","black"),null,P("卒","black"),null,P("卒","black"),null,P("卒","black"),null,P("卒","black")],
 [null,null,null,null,null,null,null,null,null],
 [null,null,null,null,null,null,null,null,null],
 [P("兵","red"),null,P("兵","red"),null,P("兵","red"),null,P("兵","red"),null,P("兵","red")],
 [null,P("炮","red"),null,null,null,null,null,P("炮","red"),null],
 [null,null,null,null,null,null,null,null,null],
 [P("車","red"),P("馬","red"),P("相","red"),P("仕","red"),P("帥","red"),P("仕","red"),P("相","red"),P("馬","red"),P("車","red")]
];

function resetGame(){
    board=initBoard.map(row=>row.map(p=>p?{...p}:null));
    selected=null;
    currentPlayer="red";
    drawBoard();
    updateInfo();
}

function updateInfo(){
    document.getElementById("info").innerText=currentPlayer==="red"?"红方走棋":"黑方走棋";
}

function drawBoard(){
    const table=document.getElementById("board");
    table.innerHTML="";

    for(let r=0;r<10;r++){
        const tr=document.createElement("tr");

        for(let c=0;c<9;c++){
            const td=document.createElement("td");

             const p=board[r][c];

            if(p){
                const span=document.createElement("span");
                span.innerText=p.text;
                span.className="piece " + (p.color==="red" ? "redPiece" : "blackPiece");
                td.appendChild(span);
            }

            if(selected && selected.r===r && selected.c===c){
                td.classList.add("selected");
            }

            td.onclick=()=>clickCell(r,c);
            tr.appendChild(td);
        }

        table.appendChild(tr);
    }
}

function countBetween(fromR,fromC,toR,toC){
    let count=0;
    if(fromR===toR){
        for(let c=Math.min(fromC,toC)+1;c<Math.max(fromC,toC);c++){
            if(board[fromR][c]) count++;
        }
    }else if(fromC===toC){
        for(let r=Math.min(fromR,toR)+1;r<Math.max(fromR,toR);r++){
            if(board[r][fromC]) count++;
        }
    }else{
        return -1;
    }
    return count;
}

function isSoldierValid(p,fromR,fromC,toR,toC){
    const dr=toR-fromR, dc=toC-fromC;
    if(p.text==="兵"){
        const crossed=fromR<=4;
        if(!crossed) return dr===-1 && dc===0;
        return (dr===-1&&dc===0)||(dr===0&&Math.abs(dc)===1);
    }
    if(p.text==="卒"){
        const crossed=fromR>=5;
        if(!crossed) return dr===1 && dc===0;
        return (dr===1&&dc===0)||(dr===0&&Math.abs(dc)===1);
    }
    return true;
}

function isCarValid(fromR,fromC,toR,toC){
    if(fromR!==toR && fromC!==toC) return false;
    return countBetween(fromR,fromC,toR,toC)===0;
}

function isHorseValid(fromR,fromC,toR,toC){
    const dr=toR-fromR, dc=toC-fromC;
    const adr=Math.abs(dr), adc=Math.abs(dc);
    if(!((adr===2&&adc===1)||(adr===1&&adc===2))) return false;

    if(adr===2){
        const legR=fromR+dr/2;
        if(board[legR][fromC]) return false;
    }
    if(adc===2){
        const legC=fromC+dc/2;
        if(board[fromR][legC]) return false;
    }
    return true;
}

function isCannonValid(fromR,fromC,toR,toC){
    if(fromR!==toR && fromC!==toC) return false;
    const count=countBetween(fromR,fromC,toR,toC);
    if(board[toR][toC]){
        return count===1;
    }else{
        return count===0;
    }
}

function isAdvisorValid(piece,fromR,fromC,toR,toC){

    if(
        Math.abs(toR-fromR)!==1 ||
        Math.abs(toC-fromC)!==1
    ){
        return false;
    }

    if(toC<3 || toC>5){
        return false;
    }

    if(piece.color==="red"){
        if(toR<7 || toR>9){
            return false;
        }
    }else{
        if(toR<0 || toR>2){
            return false;
        }
    }

    return true;
}

function isKingValid(piece,fromR,fromC,toR,toC){

    const dr=Math.abs(toR-fromR);
    const dc=Math.abs(toC-fromC);

    if(dr+dc!==1){
        return false;
    }

    if(toC<3 || toC>5){
        return false;
    }

    if(piece.color==="red"){
        if(toR<7 || toR>9){
            return false;
        }
    }else{
        if(toR<0 || toR>2){
            return false;
        }
    }

    return true;
}
    
function isElephantValid(piece,fromR,fromC,toR,toC){

    const dr=toR-fromR;
    const dc=toC-fromC;

    if(Math.abs(dr)!==2 || Math.abs(dc)!==2){
        return false;
    }

    const eyeR=fromR+dr/2;
    const eyeC=fromC+dc/2;

    if(board[eyeR][eyeC]){
        return false;
    }

    if(piece.color==="red" && toR<5){
        return false;
    }

    if(piece.color==="black" && toR>4){
        return false;
    }

    return true;
}
    
function isMoveValid(p,fromR,fromC,toR,toC){
    if(p.text==="兵" || p.text==="卒"){
        return isSoldierValid(p,fromR,fromC,toR,toC);
    }
    if(p.text==="車"){
        return isCarValid(fromR,fromC,toR,toC);
    }
    if(p.text==="馬"){
        return isHorseValid(fromR,fromC,toR,toC);
    }
    
    if(
    p.text==="仕" ||
    p.text==="士"
)
    {
    return isAdvisorValid(p,fromR,fromC,toR,toC);
}

if(
    p.text==="帥" ||
    p.text==="帅" ||
    p.text==="將" ||
    p.text==="将"
){
    return isKingValid(p,fromR,fromC,toR,toC);
}
    
    if(p.text==="炮"){
        return isCannonValid(fromR,fromC,toR,toC);
    }

if(p.text==="相" || p.text==="象"){
    return isElephantValid(p,fromR,fromC,toR,toC);
}
   
    return true;
}

function findKing(color){
    for(let r=0;r<10;r++){
        for(let c=0;c<9;c++){
            const p=board[r][c];
            if(p && p.color===color &&
              (p.text==="帥" || p.text==="帅" || p.text==="將" || p.text==="将")){
                return {r:r,c:c};
            }
        }
    }
    return null;
}

function kingsFaceEachOther(){
    const redK=findKing("red");
    const blackK=findKing("black");
    if(!redK || !blackK) return false;
    if(redK.c!==blackK.c) return false;

    let count=0;
    for(let r=Math.min(redK.r,blackK.r)+1;r<Math.max(redK.r,blackK.r);r++){
        if(board[r][redK.c]) count++;
    }
    return count===0;
}

function isKingInCheck(color){
    const king=findKing(color);
    if(!king) return false;

    const enemy=color==="red"?"black":"red";

    // 将帅照面也算被将
    if(kingsFaceEachOther()) return true;

    for(let r=0;r<10;r++){
        for(let c=0;c<9;c++){
            const p=board[r][c];
            if(p && p.color===enemy){
                if(isMoveValid(p,r,c,king.r,king.c)){
                    return true;
                }
            }
        }
    }
    return false;
}
    
function clickCell(r,c){
    const p=board[r][c];

    if(selected===null){
        if(!p) return;
        if(p.color!==currentPlayer){
            alert("现在轮到"+(currentPlayer==="red"?"红方":"黑方")+"走棋");
            return;
        }
        selected={r:r,c:c};
        drawBoard();
        return;
    }

    const from=selected;
    const moving=board[from.r][from.c];
    const target=board[r][c];

    if(from.r===r && from.c===c){
        selected=null;
        drawBoard();
        return;
    }

    if(target && target.color===currentPlayer){
        selected={r:r,c:c};
        drawBoard();
        return;
    }

    if(!isMoveValid(moving,from.r,from.c,r,c)){
        alert("这个棋子不能这样走！");
        return;
    }

    board[r][c]=moving;
    board[from.r][from.c]=null;

    if(kingsFaceEachOther()){
        board[from.r][from.c]=moving;
        board[r][c]=target;
        selected=null;
        alert("将帅不能直接照面！");
        drawBoard();
        return;
    }

    if(isKingInCheck(currentPlayer)){
        board[from.r][from.c]=moving;
        board[r][c]=target;
        selected=null;
        alert("不能这样走，自己的将/帅会被将军！");
        drawBoard();
        return;
    }

    if(target && (
        target.text==="將" ||
        target.text==="将" ||
        target.text==="帥" ||
        target.text==="帅"
    )){
        alert(moving.color==="red" ? "红方胜利" : "黑方胜利");
        resetGame();
        return;
    }

    selected=null;
    currentPlayer=currentPlayer==="red"?"black":"red";

    drawBoard();
    updateInfo();

    if(isKingInCheck(currentPlayer)){
        alert("将军！");
    }
}
    
resetGame();
</script>
</body>
</html>
