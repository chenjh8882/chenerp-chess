<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>ChenERP 中国象棋</title>

<style>
body{
    text-align:center;
    font-family:Microsoft YaHei;
    background:#f5f5f5;
}

h1{
    color:#b30000;
}

#board{
    margin:auto;
    border-collapse:collapse;
}

#board td{
    width:60px;
    height:60px;
    border:1px solid #333;
    background:#f4d9a3;
    font-size:28px;
    font-weight:bold;
    text-align:center;
    cursor:pointer;
}

.red{
    color:red;
}

.black{
    color:black;
}
</style>
</head>

<body>

<h1>ChenERP 中国象棋</h1>

<table id="board"></table>

<script>

const board=[
['車','馬','象','士','將','士','象','馬','車'],
['','','','','','','','',''],
['','炮','','','','','','炮',''],
['卒','','卒','','卒','','卒','','卒'],
['','','','','','','','',''],
['','','','','','','','',''],
['兵','','兵','','兵','','兵','','兵'],
['','炮','','','','','','炮',''],
['','','','','','','','',''],
['車','馬','相','仕','帥','仕','相','馬','車']
];

const table=document.getElementById("board");

for(let r=0;r<10;r++){

let tr=document.createElement("tr");

for(let c=0;c<9;c++){

let td=document.createElement("td");

td.innerHTML=board[r][c];

if(r<5){
td.className="black";
}else{
td.className="red";
}

tr.appendChild(td);

}

table.appendChild(tr);

}

</script>

</body>
</html>
